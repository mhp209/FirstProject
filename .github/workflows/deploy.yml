# new with composer


name: Docker CI/CD Laravel

on:
  push:
    branches: [ main ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    # ✅ Start full stack (app + db + nginx)
    - name: Start Containers
      run: docker compose up -d --build

    # ✅ Wait for MySQL to be ready
    - name: Wait for DB
      run: sleep 25

    # ✅ Setup Laravel inside container
    - name: Laravel Setup
      run: |
        docker exec roadsathi_app cp .env.example .env
        docker exec roadsathi_app composer install
        docker exec roadsathi_app php artisan key:generate
        docker exec roadsathi_app php artisan migrate --force

    # ✅ Login Docker Hub
    - name: Login Docker
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # ✅ Build + Push Image
    - name: Build & Push Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/roadsathi .
        docker push ${{ secrets.DOCKER_USERNAME }}/roadsathi

    # ✅ Deploy to EC2
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/roadsathi

          docker stop roadsathi_app || true
          docker rm roadsathi_app || true

          docker run -d -p 80:80 --name roadsathi_app ${{ secrets.DOCKER_USERNAME }}/roadsathi